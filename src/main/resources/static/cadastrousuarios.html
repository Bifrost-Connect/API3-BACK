<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/cadusuarios.css">
</head>
<body class="pagina-chamados">

<div class="top-bar">
    <div class="left">
        <button id="btnmenu">
            <img src="img/menu.png" alt="icone menu">
        </button>
        <span class="titulo">Bem vindo, <span id="nome-usuario-logado"></span>!</span>
    </div>
    <div class="logout">
        <button id="btnlogout" onclick="btnlogout()">
            <img src="img/logout.png" alt="icone logout">
        </button>
    </div>
</div>

<div class="notificacao-bar">
    <img src="img/bell.png" class="bell">
    <span>Você possui 1 solicitação de serviço!</span>
    <div class="badge">3</div>
</div>

<div id="sidebar" class="sidebar">
    <button id="btnx" class="close-btn">×</button>
    <a href="telainicial-gestor.html">TELA INICIAL</a>
    <a href="cadastroveiculos.html">CADASTRO DE VEÍCULOS</a>
</div>

<div class="chamado-card">
    <h2 class="chamado-titulo">CADASTRO DE USUÁRIOS:</h2>
    <div class="chamado-conteudo">
        <div class="coluna">
            <div class="group">
                <input required type="text" class="input" id="cadNome">
                <span class="bar"></span>
                <label>Nome:</label>
            </div>
            <div class="group">
                <input required type="text" class="input" id="cadEmail">
                <span class="bar"></span>
                <label>E-mail:</label>
            </div>
        </div>
        <div class="coluna">
            <div class="group">
                <input required type="text" class="input" id="cadMatricula">
                <span class="bar"></span>
                <label>Matrícula:</label>
            </div>
            <div class="group">
                <input required type="password" class="input" id="cadSenha">
                <span class="bar"></span>
                <label>Senha:</label>
            </div>
        </div>
    </div>
    <button class="btn-aceitar" onclick="cadastrarUsuario()">
        Cadastrar
    </button>
</div>

<div id="modalConfirmacao" class="sobreposicao" style="display:none;">
    <div class="popup-card">
        <h2 class="popup-titulo">Concluido!</h2>
        <div class="popup-conteudo">
            <p><strong>Usuário cadastrado com sucesso!</strong></p>
        </div>
        <button onclick="fecharTodosModais()" style="margin-top:10px; padding:5px 15px; cursor:pointer;">OK</button>
    </div>
</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/user.js"></script>
</body>
</html>
