<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Veículos</title>
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/tecnicos.css">
</head>

<body class="pagina-tecnicos">

    <div id="topbar-container"></div>

    <main class="tecnicos-container">
        <section class="painel-tecnicos">
            <div class="painel-tecnicos-topo">
                <div>
                    <h1>Visão geral de veículos</h1>
                    <p>Consulte a frota completa, filtre por modelo, marca ou status e exporte informações em XML.</p>
                </div>
                <div class="tecnicos-actions">
                    <button type="button" class="btn-acao-filtrar" onclick="aplicarFiltroVeiculos()">Buscar</button>
                    <button type="button" class="btn-limpar-filtro" onclick="limparFiltroVeiculos()">Limpar</button>
                    <button type="button" class="btn-limpar-filtro" onclick="abrirPopupExportacao('veiculos')">Exportar veículos</button>
                </div>
            </div>

            <section class="tecnicos-filtro-panel">
                <div class="filtro-busca">
                    <input id="filtroBuscaVeiculo" type="text" class="filtro-busca-input"
                        placeholder="Digite modelo, marca, prefixo ou placa">
                </div>
            </section>

            <div class="tecnicos-table-wrapper">
                <table class="tecnicos-table">
                    <thead>
                        <tr>
                            <th>Modelo</th>
                            <th>Marca</th>
                            <th>Prefixo</th>
                            <th>Placa</th>
                            <th>Tipo</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="veiculosTabelaCorpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="popupExportacao" class="sobreposicao">
        <div class="popup-card">
            <button class="popup-close" type="button" onclick="fecharPopupExportacao()">×</button>
            <h2 class="popup-titulo" id="popupExportacaoTitulo">Exportar itens</h2>
            <div class="popup-conteudo" id="popupExportacaoConteudo">
                <div>
                    <h3 id="popupExportacaoSubtitulo">Selecione os veículos que deseja exportar</h3>
                    <div class="popup-list" id="listaExportacaoItens"></div>
                </div>
            </div>
            <div class="popup-actions">
                <button type="button" class="btn-acao-filtrar" onclick="exportarXmlSelecionados()">Exportar selecionados</button>
                <button type="button" class="btn-limpar-filtro" onclick="fecharPopupExportacao()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="popupExportOpcao" class="sobreposicao popup-export-opcoes">
        <div class="popup-card">
            <button class="popup-close" type="button" onclick="fecharPopupExportOpcao()">×</button>
            <h2 class="popup-titulo">Escolha o formato</h2>
            <div class="popup-conteudo export-formatos">
                <button type="button" class="btn-export-format" onclick="exportarComo('xml')">XML</button>
                <button type="button" class="btn-export-format" onclick="exportarComo('excel')">Excel</button>
                <button type="button" class="btn-export-format" onclick="exportarComo('doc')">DOC</button>
            </div>
            <div class="popup-actions">
                <button type="button" class="btn-limpar-filtro" onclick="fecharPopupExportOpcao()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="sidebar-container"></div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Operação realizada com sucesso!</div>

    <script src="js/basic.js"></script>
    <script src="js/componentes.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/veiculos.js"></script>
    <script src="js/exportacao.js"></script>
    <script>
        injetarLayout("Veículos");
    </script>
</body>

</html>
