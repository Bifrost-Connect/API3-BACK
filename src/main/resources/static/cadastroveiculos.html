<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículos</title>
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/cadveiculos.css">
</head>

<body class="pagina-chamados">

    <div id="topbar-container"></div>

    <div id="sidebar-container"></div>

    <div class="chamado-card">
        <h2 class="chamado-titulo">CADASTRO DE VEÍCULOS:</h2>

        <div class="chamado-conteudo">
            <div class="coluna">
                <div class="group">
                    <input required type="text" class="input">
                    <label>Marca:</label>
                </div>
                <div class="group">
                    <input required type="text" class="input">
                    <label>Modelo:</label>
                </div>
                <div class="group">
                    <input required type="number" class="input">
                    <label>Ano:</label>
                </div>
                <div class="group">
                    <input required type="text" class="input">
                    <label>Cor:</label>
                </div>
                <div class="group">
                    <select required class="input" value="">
                        <option value=""></option>
                        <option value="Passeio">Passeio</option>
                        <option value="Utilitario">Utilitário</option>
                    </select>
                    <label>Tipo:</label>
                </div>
            </div>

            <div class="coluna">
                <div class="group">
                    <input required type="text" class="input">
                    <label>Placa:</label>
                </div>
                <div class="group">
                    <input required type="text" class="input">
                    <label>Prefixo:</label>
                </div>
                <div class="group">
                    <select required class="input" value="" onchange="this.setAttribute('value', this.value);">
                        <option value=""></option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                    </select>
                    <label>CNH Necessária:</label>
                </div>
                <div class="group">
                    <input required type="number" class="input" min="0">
                    <label>KM's Rodados:</label>
                </div>
                <div class="group">
                    <input required type="number" class="input" min="0">
                    <label>Próxima troca de óleo (KM):</label>
                </div>
            </div>
        </div>

        <button class="btn-aceitar" id="btncadastrar">
            Cadastrar
        </button>
    </div>

    <div id="popupConfirmacao" class="popup" style="display: none;">
        <div class="popup-content">
            <h2>Confirmar?</h2>
            <p>Você deseja realmente salvar as informações de cadastro?</p>
            <div class="popup-buttons">
                <button id="btn-cancelar-confirmacao" class="btn-voltar">Voltar</button>
                <button id="btn-confirmar-final" class="btn-aceitar">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="popupSucesso" class="popup" style="display: none;">
        <div class="popup-content">
            <h2>Sucesso!</h2>
            <p>Veículo cadastrado com sucesso.</p>
            <div class="popup-buttons">
                <button id="btn-fechar-sucesso" class="btn-aceitar">OK</button>
            </div>
        </div>
    </div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>

    <script src="js/componentes.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/vehicle.js"></script>
    <script>
        document.getElementById("topbar-container").insertAdjacentHTML("beforeend", renderizarTopBar("Cadastro de Veículos"));
        document.getElementById("sidebar-container").insertAdjacentHTML("beforeend", renderizarSidebarGestor());
        inicializarComponentes();
    </script>
</body>

</html>
