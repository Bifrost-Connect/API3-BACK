<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect - Cadastro de Veículos</title>
    <link rel="stylesheet" href="css/cadveiculos.css">
</head>

<body class="pagina-chamados">

<div class="top-bar">
    <div class="left">
        <button id="btnmenu">
            <img src="img/menu.png" alt="icone menu">
        </button>
        <span class="titulo">Bem vindo, <span id="nome-usuario-logado"></span>!</span>
    </div>

    <div class="logout">
        <button id="btnlogout" onclick="btnlogout()">
            <img src="img/logout.png" alt="icone logout">
        </button>
    </div>
</div>

<div class="notificacao-bar">
    <img src="img/bell.png" class="bell">
    <span>Você possui 1 solicitação de serviço!</span>
    <div class="badge">3</div>
</div>

<div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

<div id="sidebar" class="sidebar">
    <button id="btnx" class="close-btn">×</button>
    <a href="telainicial-gestor.html">TELA INICIAL</a>
    <a href="historicochamados.html">HISTÓRICO DE CHAMADOS</a>
    <a href="cadastrousuarios.html">CADASTRO DE USUÁRIOS</a>
    <a href="duvidas.html">DÚVIDAS</a>
    <a href="configuracoes.html">CONFIGURAÇÕES</a>
</div>

<div class="chamado-card">
    <h2 class="chamado-titulo">CADASTRO DE VEÍCULOS:</h2>

    <div class="chamado-conteudo">
        <div class="coluna">
            <div class="group">
                <input required type="text" class="input" id="cad-marca">
                <span class="bar"></span>
                <label>Marca:</label>
            </div>
            <div class="group">
                <input required type="text" class="input" id="cad-modelo">
                <span class="bar"></span>
                <label>Modelo:</label>
            </div>
            <div class="group">
                <input required type="text" class="input" id="cad-tipo">
                <span class="bar"></span>
                <label>Tipo de Veículo:</label>
            </div>
        </div>

        <div class="coluna">
            <div class="group">
                <input required type="text" class="input" id="cad-placa">
                <span class="bar"></span>
                <label>Placa:</label>
            </div>
            <div class="group">
                <input required type="text" class="input" id="cad-prefixo">
                <span class="bar"></span>
                <label>Prefixo:</label>
            </div>
        </div>
    </div>

    <button class="btn-aceitar" onclick="abrirModalConfirmacao()">
        Cadastrar
    </button>
</div>

<div id="modalConfirmacao" class="sobreposicao">
    <div class="popup-card">
        <button class="close-btn" onclick="fecharTodosModais()" style="position: absolute; right: 10px; top: 10px; background: none; border: none; font-size: 20px; cursor: pointer;">×</button>
        <h2 class="popup-titulo">Concluído!</h2>
        <div class="popup-conteudo">
            <p style="text-align: center;"><strong>Veículo cadastrado com sucesso!</strong></p>
        </div>
        <button class="btn-aceitar" onclick="fecharTodosModais()" style="margin-top: 20px;">OK</button>
    </div>
</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/vehicle.js"></script>
</body>
</html>
